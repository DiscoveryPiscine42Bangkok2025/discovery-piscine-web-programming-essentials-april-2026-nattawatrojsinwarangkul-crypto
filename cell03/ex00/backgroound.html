<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Random Background Changer</title>
    <meta name="description" content="Simple interactive page: click the button to change the background to a random color.">
    <!-- External CSS (background.css) -->
    <link rel="stylesheet" href="background.css">
</head>
<body>

    <!-- Simple button – main interactive element -->
    <button id="randomColorBtn" class="bg-changer-btn">Click me!</button>

    <!-- Vanilla JavaScript: no frameworks, no jQuery -->
    <script>
        (function() {
            // Get a reference to the button element
            const btn = document.getElementById('randomColorBtn');
            
            /**
             * Generates a random RGB color.
             * Each component (red, green, blue) is an integer between 0 and 255.
             * @returns {string} RGB color string in format 'rgb(r, g, b)'
             */
            function getRandomRgbColor() {
                const red = Math.floor(Math.random() * 256);
                const green = Math.floor(Math.random() * 256);
                const blue = Math.floor(Math.random() * 256);
                return `rgb(${red}, ${green}, ${blue})`;
            }
            
            /**
             * Event handler: changes the page background color to a fresh random color.
             * Targets the <body> element to cover the whole viewport.
             */
            function changeBackgroundColor() {
                const newColor = getRandomRgbColor();
                document.body.style.backgroundColor = newColor;
            }
            
            // Attach click event listener to the button (pure JS, no inline onclick)
            if (btn) {
                btn.addEventListener('click', changeBackgroundColor);
            } else {
                // Fallback in case button ID is not found (should never happen with correct HTML)
                console.warn('Button element not found!');
            }
        })();
    </script>
</body>
</html>
