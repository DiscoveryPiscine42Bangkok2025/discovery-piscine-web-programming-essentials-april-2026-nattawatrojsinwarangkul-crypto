<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do or not to do</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: #4a6cf7;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        .controls {
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        #new-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        #new-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        #ft_list {
            min-height: 400px;
            padding: 20px;
        }

        .todo-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            position: relative;
        }

        .todo-item:hover {
            background: #f8f9fa;
            transform: translateX(5px);
        }

        .todo-item:active {
            transform: scale(0.98);
        }

        .empty-message {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 40px 20px;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 14px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>To do or not to do</h1>
        </header>
        
        <div class="controls">
            <button id="new-btn">New</button>
        </div>
        
        <div id="ft_list"></div>
        
        <footer>
            Click on a task to delete it • Saved automatically in cookies
        </footer>
    </div>

    <script src="todo.js"></script>
</body>
</html>
