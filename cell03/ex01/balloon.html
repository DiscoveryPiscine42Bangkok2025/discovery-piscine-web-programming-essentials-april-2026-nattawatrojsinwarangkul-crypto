<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Balloon Exploder | Interactive Challenge</title>
    <style>
        * {
            user-select: none; /* Prevent accidental text selection while clicking */
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #d4e0f0 0%, #b0c4de 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* container centers balloon and adds playful atmosphere */
        .playground {
            text-align: center;
            padding: 2rem;
            border-radius: 60px;
            background: rgba(255, 248, 225, 0.3);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }

        /* The balloon itself */
        .balloon {
            width: 200px;
            height: 200px;
            background-color: #e34234; /* vivid red */
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3), inset 0 -5px 0 rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }

        /* subtle string effect (just for fun, no impact on logic) */
        .balloon::after {
            content: '';
            display: block;
            width: 2px;
            height: 35px;
            background: #6b4c3b;
            position: relative;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 1px;
            box-shadow: 0 0 2px #3e2a21;
        }

        /* interactive hint */
        .info-panel {
            margin-top: 45px;
            background: #2c2e3a;
            border-radius: 48px;
            padding: 12px 28px;
            color: #f0ede8;
            font-weight: 500;
            backdrop-filter: blur(4px);
            background: rgba(30, 30, 40, 0.8);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .info-panel span {
            display: inline-block;
            background: #facc15;
            color: #1e1e2a;
            padding: 0 10px;
            border-radius: 60px;
            font-weight: bold;
            margin: 0 4px;
        }

        .badge {
            font-size: 0.8rem;
            margin-top: 12px;
            opacity: 0.8;
        }

        @media (max-width: 500px) {
            .balloon {
                width: 200px;
                height: 200px;
            }
            .info-panel {
                font-size: 0.75rem;
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>
<div class="playground">
    <!-- balloon element: all interactions happen here -->
    <div class="balloon" id="dynamicBalloon"></div>

    <div class="info-panel">
        🎈 <strong>Balloon lab</strong> &nbsp;|&nbsp;
        🔴 click → +10px &nbsp;•&nbsp; 🎨 color cycle <span>RED → GREEN → BLUE</span> &nbsp;•&nbsp;
        💥 >420px → EXPLODE (reset) <br>
        🖱️ mouse leave → shrink 5px &nbsp;•&nbsp; 🔄 color reverse cycle
        <div class="badge">✨ round shape | cannot shrink below 200px ✨</div>
    </div>
</div>

<script>
    (function() {
        // ----- COLOR PALETTE (forward order)
        const COLOR_CYCLE = ["red", "green", "blue"];
        // map color names to actual CSS colors with vibrant, nice tones
        const colorMap = {
            red: "#e34234",     // vibrant firebrick red
            green: "#2e8b57",   // sea green, clear & vivid
            blue: "#3b82f6"     // electric blue
        };

        // DOM element
        const balloon = document.getElementById("dynamicBalloon");

        // ---------- STATE ----------
        let currentSize = 200;          // size in pixels (width & height)
        let currentColorIndex = 0;      // 0: red, 1: green, 2: blue

        // Helper: apply style based on current size & color index
        function applyBalloonStyle(size, colorIndex) {
            // enforce integer size and round boundaries
            const finalSize = Math.max(200, size);
            // assign width & height (keep perfect circle)
            balloon.style.width = finalSize + "px";
            balloon.style.height = finalSize + "px";
            // apply background color from color map using index
            const colorName = COLOR_CYCLE[colorIndex];
            balloon.style.backgroundColor = colorMap[colorName];
            // for extra robustness store data attributes (optional)
            balloon.setAttribute("data-size", finalSize);
            balloon.setAttribute("data-color", colorName);
        }

        // full state updater: updates both global variables and visual
        function setBalloonState(newSize, newColorIndex) {
            // clamp size to never go under 200px (also ensures no negative)
            let clampedSize = newSize;
            if (clampedSize < 200) clampedSize = 200;
            
            // update global state
            currentSize = clampedSize;
            currentColorIndex = newColorIndex % COLOR_CYCLE.length;
            // apply to DOM
            applyBalloonStyle(currentSize, currentColorIndex);
        }

        // ------ EXPLOSION HANDLER (reset to original state) ------
        function explodeBalloon() {
            // reset to original size (200px) and original color (red = index 0)
            setBalloonState(200, 0);
            // optional tiny visual 'pop' feedback (subtle scale flash)
            balloon.style.transform = "scale(0.98)";
            setTimeout(() => {
                if (balloon) balloon.style.transform = "";
            }, 90);
        }

        // ----- CLICK BEHAVIOR (grow + forward cycle + explosion condition)
        function onBalloonClick() {
            // 1. increase size by 10px
            let newSize = currentSize + 10;
            // 2. cycle color forward (red -> green -> blue -> red)
            let newColorIndex = (currentColorIndex + 1) % COLOR_CYCLE.length;
            
            // TEMPORARILY update state (but we might override if explosion needed)
            // However explosion condition depends on size after increment
            // If newSize > 420 => explosion overrides both size & color to original
            if (newSize > 420) {
                // EXPLOSION: reset to original size (200) and original color (red)
                explodeBalloon();
                // after explosion, we must not apply the previous color/size increment.
                // explodeBalloon already sets currentSize=200, colorIndex=0.
                // No further action needed.
                return;
            }
            
            // NORMAL GROWTH: no explosion, apply the new size & new color
            setBalloonState(newSize, newColorIndex);
            
            // add slight "inflation" micro feedback (pop-like)
            balloon.style.transform = "scale(1.02)";
            setTimeout(() => {
                if (balloon) balloon.style.transform = "";
            }, 70);
        }

        // ----- MOUSE LEAVE BEHAVIOR (shrink by 5px + reverse color cycle)
        function onBalloonMouseLeave() {
            // shrink by 5px, but cannot go below 200px
            let newSize = currentSize - 5;
            if (newSize < 200) newSize = 200;
            
            // reverse color order: (currentIndex - 1 + 3) % 3  <=> (currentIndex + 2) % 3
            // because reverse cycle: red -> blue -> green -> red
            let newColorIndex = (currentColorIndex + 2) % COLOR_CYCLE.length;
            
            // apply new state (size may stay same if already 200, but color ALWAYS changes in reverse)
            setBalloonState(newSize, newColorIndex);
            
            // subtle deflate effect
            balloon.style.transform = "scale(0.97)";
            setTimeout(() => {
                if (balloon) balloon.style.transform = "";
            }, 70);
        }
        
        // ---------- Edge case safety: ensure that after any external overflow (theoretically not needed)
        // but if some event sequence accidentally pushes size over 420 again? we guarantee explosion.
        // Also provide an integrity check that size >420 never persists (but since we already enforce
        // on click, and no other event increases size, it's safe). However for total robustness we can
        // add a watch guard: but not necessary, but better to keep balloon size integrity.
        // Additional safe check: whenever state updates via setBalloonState, we can also verify
        // that if size > 420 it triggers explosion. But according to spec, only click can cause growth beyond limit,
        // and we already handle explosion before applying state. BUT if for any reason mouse events or something else
        // increments size? Not in the requirements. However we implement a silent integrity check inside setBalloonState:
        // if newSize > 420 then automatically reset (explode). This ensures even in weird scenarios the balloon never stays >420.
        // Override setBalloonState with explosion hook to follow spec perfectly.
        // We'll override setBalloonState slightly to add explosion protection, making sure that if any code path
        // tries to set size >420, it triggers explosion instead.
        // But careful: our click already handles explosion before calling setBalloonState, but for completeness we wrap.
        const originalSetState = setBalloonState;
        window.setBalloonState = function(newSize, newColorIndex) {
            if (newSize > 420) {
                // if someone attempts to set size beyond 420, force explosion (reset to original)
                // ensures consistency
                currentSize = 200;
                currentColorIndex = 0;
                applyBalloonStyle(200, 0);
                // also add pop feedback
                balloon.style.transform = "scale(0.98)";
                setTimeout(() => { if(balloon) balloon.style.transform = ""; }, 90);
                return;
            }
            // otherwise normal update
            let clampedSize = newSize < 200 ? 200 : newSize;
            currentSize = clampedSize;
            currentColorIndex = newColorIndex % COLOR_CYCLE.length;
            applyBalloonStyle(currentSize, currentColorIndex);
        };
        // rebind to ensure all internal calls use guarded version
        setBalloonState = window.setBalloonState;
        
        // re-define explodeBalloon using safe setter
        window.explodeBalloon = function() {
            setBalloonState(200, 0);
            balloon.style.transform = "scale(0.98)";
            setTimeout(() => { if(balloon) balloon.style.transform = ""; }, 90);
        };
        
        // patch click handler to use guarded functions (already uses setBalloonState/explode)
        // But ensure the earlier onBalloonClick references currentSize/currentColorIndex
        // after we replace setBalloonState, it's still consistent.
        // also rewrite onBalloonClick with guard, but we need to sync.
        // Actually better to replace event handlers with final versions referencing the safe state methods.
        // Override click & leave again to guarantee they use the final safe functions.
        
        // Since we already have currentSize/currentColorIndex but we replaced setBalloonState,
        // we must ensure onBalloonClick & onBalloonMouseLeave use the final safe setters.
        // re-define final event handlers to avoid inconsistency.
        
        // Final robust event handlers
        function finalClickHandler() {
            // compute tentative new size and color index
            let newSizeCandidate = currentSize + 10;
            let newColorCandidate = (currentColorIndex + 1) % COLOR_CYCLE.length;
            
            // explosion condition (strictly > 420)
            if (newSizeCandidate > 420) {
                // explode: resets to 200px and red (index 0)
                setBalloonState(200, 0);
                // visual pop
                balloon.style.transform = "scale(0.96)";
                setTimeout(() => { if(balloon) balloon.style.transform = ""; }, 80);
                return;
            }
            // normal growth
            setBalloonState(newSizeCandidate, newColorCandidate);
            balloon.style.transform = "scale(1.02)";
            setTimeout(() => { if(balloon) balloon.style.transform = ""; }, 70);
        }
        
        function finalMouseLeaveHandler() {
            // shrink by 5px but not below 200px
            let shrunkSize = currentSize - 5;
            if (shrunkSize < 200) shrunkSize = 200;
            // reverse color cycle: (currentIndex - 1 + 3) % 3 = (currentIndex + 2) % 3
            let reversedColorIndex = (currentColorIndex + 2) % COLOR_CYCLE.length;
            // apply new state (size may stay 200 if already min)
            setBalloonState(shrunkSize, reversedColorIndex);
            // slight deflate animation
            balloon.style.transform = "scale(0.97)";
            setTimeout(() => { if(balloon) balloon.style.transform = ""; }, 70);
        }
        
        // remove any previous listeners (just in case, but there are none yet)
        // attach fresh event listeners
        balloon.removeEventListener("click", onBalloonClick);
        balloon.removeEventListener("mouseleave", onBalloonMouseLeave);
        balloon.addEventListener("click", finalClickHandler);
        balloon.addEventListener("mouseleave", finalMouseLeaveHandler);
        
        // Also ensure that on page load the balloon is exactly 200px, red, round.
        // Force initial state with correct background, size, border-radius (already via CSS)
        // but apply style using our safe state function
        setBalloonState(200, 0);
        
        // final cross-check: guarantee border-radius stays 50% even if inline style overrides?
        balloon.style.borderRadius = "50%";
        // ensure box sizing consistency
        balloon.style.boxSizing = "border-box";
        
        // extra small helper: for mobile/touch devices, also "mouseleave" works fine,
        // but for touch "mouseleave" works after leaving element boundary. perfect.
        
        // For debugging or educational info: log state changes in console if needed? not required.
        // ensure the "currentSize" and "currentColorIndex" always reflect reality after setBalloonState
        // we have already the setter updates global vars.
        
        // Edge case guarantee: When exploding due to click, the balloon returns to original size (200px) and red.
        // The reverse order on mouse leave works as described.
        // Double-check reverse order expected sequence:
        // forward: red(0) -> green(1) -> blue(2) -> red(0)
        // reverse: red(0) -> blue(2) -> green(1) -> red(0). That's exactly (index+2)%3.
        // Demonstration: if current red (0), leave => new index = 2 (blue) → correct.
        // if current blue (2), leave => new index = 1 (green). if current green (1) => new index = 0 (red).
        // Perfect.
        
        // Additional requirement: When mouse leaves the balloon, size shrinks by 5px (can't go under 200px)
        // and color changes in reverse order. This is fully implemented.
        // Also requirement: On click, if size becomes >420px, balloon explodes and returns to original size (200px)
        // we also reset color to red (original). This respects the statement.
        
        // One more nuance: The exercise says "When a click occurs on the balloon, its size will grow by 10px while keeping its round shape.
        // With each click its color will go in that order from red to green, then blue and back to red again."
        // And then: "if its size becomes greater than 420px it will explode and return to its original size."
        // Explosion returns to original size, and original color implied (red). Perfect.
        
        // On mouse leave: "the size of the balloon shrinks by 5px (the size of the balloon cannot go lower than 200px) 
        // and its color changes in the reverse order than mentioned earlier." Reverse order applied perfectly.
        
        // No size below 200px is strictly enforced.
        
        // Additional quality: transition provides nice smooth feedback, and the balloon stays fully round.
        // Also guarantee that the initial style border-radius remains despite size changes: we enforce inline border-radius:50%
        // but since CSS class .balloon already has border-radius: 50%, inline style also ensure.
        
        // Accessibility: cursor pointer for click.
        
        // Also to avoid any memory leaks or event collisions, we keep handlers.
        console.log("🎈 Balloon ready! Click to inflate & cycle colors | Mouse leave to deflate & reverse color.");
    })();
</script>
</body>
</html>
