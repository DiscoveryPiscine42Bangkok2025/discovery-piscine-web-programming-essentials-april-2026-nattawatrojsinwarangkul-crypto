<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 05: Responsive Tab</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents scrollbars if table is exactly 100% */
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            border: 1px solid black;
            table-layout: fixed;
        }
        
        td {
            padding: 10px;
            border: 1px solid black;
            vertical-align: middle;
            text-align: center;
            font-family: sans-serif;
            font-size: 2vw; /* Text size shrinks with window width */
        }

        .box-one {
            background-color: #8B943E;
            color: white;
        }

        .box-two {
            background-color: #E3A687;
            color: black;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="box-one">First cell</td>
            <td class="box-two">Second cell</td>
        </tr>
    </table>

</body>
</html>
