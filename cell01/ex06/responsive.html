<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 05: Tab - Full Page Responsive</title>
    <style>
        /* 1. Set html and body to 100% height and remove default margin 
           so the table can truly cover the entire web page.
        */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* 2. Set the table width and height to 100%. 
           border-collapse ensures borders don't double up.
        */
        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            border: 1px solid black;
            /* table-layout: fixed ensures cells share space equally 
               even if the content inside them differs in length */
            table-layout: fixed;
        }
        
        td {
            padding: 10px;
            border: 1px solid black;
            vertical-align: middle;
            text-align: center;
        }

        .box-one {
            background-color: #8B943E; /* Olive green */
            color: black;
        }

        .box-two {
            background-color: #E3A687; /* Peachy/Salmon color */
            color: black;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="box-one">First cell</td>
            <td class="box-two">Second cell</td>
        </tr>
    </table>

</body>
</html>
