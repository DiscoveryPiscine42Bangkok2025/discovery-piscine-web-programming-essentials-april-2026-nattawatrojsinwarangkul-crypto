<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 05: Tab</title>
    <style>
        /* This CSS styles the table to look like the image */
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
        }
        
        td {
            height: 100px; /* Adjust height as needed */
            padding: 10px;
            border: 1px solid black;
            vertical-align: middle;
        }

        /* Specific colors for each box */
        .box-one {
            background-color: #8B943E; /* Olive green */
            color: black;
        }

        .box-two {
            background-color: #E3A687; /* Peachy/Salmon color */
            color: black;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="box-one">First cell</td>
            <td class="box-two">Second cell</td>
        </tr>
    </table>

</body>
</html>
